server:
  http_listen_port: 9080
  grpc_listen_port: 9081

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['host.docker.internal:9090']

  - job_name: 'docker'
    static_configs:
      - targets: ['host.docker.internal:9323']

  - job_name: 'node'
    static_configs:
      - targets: ['host.docker.internal:9100']